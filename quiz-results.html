<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Your Results</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=DM+Mono:wght@500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --risk-color: #E24B4A;
    --risk-bg: #FCEBEB;
    --risk-border: #F09595;
    --risk-text: #791F1F;
  }

  body {
    font-family: 'DM Sans', sans-serif;
    background: #F7F6F2;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 2rem 1rem;
  }

  .card {
    background: #fff;
    border-radius: 24px;
    border: 1px solid #E8E6E0;
    padding: 3rem 2.5rem 2.5rem;
    max-width: 440px;
    width: 100%;
    text-align: center;
  }

  .quiz-label {
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: #9B9890;
    margin-bottom: 2rem;
  }

  .gauge-wrap {
    width: 300px;
    margin: 0 auto 2rem;
  }

  .gauge-wrap svg { width: 100%; overflow: visible; }

  .gauge-fill {
    fill: none;
    stroke: var(--risk-color);
    stroke-width: 22;
    stroke-linecap: round;
    stroke-dasharray: 0 410;
    transition: stroke-dasharray 1.5s cubic-bezier(0.34, 1.1, 0.64, 1), stroke 0.4s ease;
  }

  .risk-badge {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    padding: 10px 22px;
    border-radius: 100px;
    background: var(--risk-bg);
    border: 1px solid var(--risk-border);
    font-size: 15px;
    font-weight: 600;
    color: var(--risk-text);
    margin-bottom: 1.5rem;
    transition: background 0.4s, border-color 0.4s, color 0.4s;
  }

  .risk-dot {
    width: 10px;
    height: 10px;
    border-radius: 50%;
    background: var(--risk-color);
    flex-shrink: 0;
    transition: background 0.4s;
  }

  .risk-message {
    font-size: 15px;
    color: #5C5A54;
    line-height: 1.7;
  }

  .needle-g {
    transform-origin: 150px 140px;
    transform: rotate(-90deg);
    transition: transform 1.5s cubic-bezier(0.34, 1.1, 0.64, 1);
  }
</style>
</head>
<body>
<div class="card">
  <p class="quiz-label">Your results</p>

  <div class="gauge-wrap">
    <svg viewBox="0 0 300 155" xmlns="http://www.w3.org/2000/svg">

      <!-- Faint zone tints -->
      <path fill="none" stroke="#E24B4A" stroke-width="22" stroke-linecap="butt" opacity="0.15"
        d="M 20 140 A 130 130 0 0 1 280 140"
        style="stroke-dasharray:201 207;stroke-dashoffset:0"/>
      <path fill="none" stroke="#EF9F27" stroke-width="22" stroke-linecap="butt" opacity="0.15"
        d="M 20 140 A 130 130 0 0 1 280 140"
        style="stroke-dasharray:122 286;stroke-dashoffset:-201"/>
      <path fill="none" stroke="#639922" stroke-width="22" stroke-linecap="butt" opacity="0.15"
        d="M 20 140 A 130 130 0 0 1 280 140"
        style="stroke-dasharray:85 323;stroke-dashoffset:-323"/>

      <!-- Track -->
      <path fill="none" stroke="#EDECEA" stroke-width="22" stroke-linecap="round"
        d="M 20 140 A 130 130 0 0 1 280 140"/>

      <!-- Active fill -->
      <path class="gauge-fill" id="gaugeFill"
        d="M 20 140 A 130 130 0 0 1 280 140"/>

      <!-- Zone labels only — no numbers -->
      <text font-family="'DM Sans', sans-serif" font-size="11" font-weight="600" fill="#C0433F" text-anchor="middle" x="44" y="112">High</text>
      <text font-family="'DM Sans', sans-serif" font-size="11" font-weight="600" fill="#BA7517" text-anchor="middle" x="150" y="22">Medium</text>
      <text font-family="'DM Sans', sans-serif" font-size="11" font-weight="600" fill="#3B6D11" text-anchor="middle" x="256" y="112">Low</text>

      <!-- Needle -->
      <g class="needle-g" id="gaugeNeedle">
        <line x1="150" y1="140" x2="150" y2="30"
          stroke="#2C2C2A" stroke-width="2.5" stroke-linecap="round"/>
        <circle cx="150" cy="140" r="7" fill="#2C2C2A"/>
        <circle cx="150" cy="140" r="3.5" fill="#fff"/>
      </g>
    </svg>
  </div>

  <div class="risk-badge">
    <span class="risk-dot" id="riskDot"></span>
    <span id="riskLabel">—</span>
  </div>

  <p class="risk-message" id="riskMessage"></p>
</div>

<script>
  const RISK = {
    high: {
      label: "High risk",
      color: "#E24B4A", bg: "#FCEBEB", border: "#F09595", text: "#791F1F",
      needleDeg: -65,
      arcFraction: 0.27,
      msg: "Your responses suggest a high risk level. We strongly recommend reviewing the material and consulting with an advisor before proceeding."
    },
    medium: {
      label: "Medium risk",
      color: "#EF9F27", bg: "#FAEEDA", border: "#FAC775", text: "#633806",
      needleDeg: 2,
      arcFraction: 0.64,
      msg: "Your responses indicate a moderate risk level. Consider reviewing key areas to improve your understanding and reduce exposure."
    },
    low: {
      label: "Low risk",
      color: "#639922", bg: "#EAF3DE", border: "#C0DD97", text: "#27500A",
      needleDeg: 65,
      arcFraction: 0.91,
      msg: "Great work — your responses reflect a low risk level. You demonstrate strong understanding in this area. Keep it up!"
    }
  };

  function getRiskLevel(score) {
    if (score <= 49) return 'high';
    if (score <= 80) return 'medium';
    return 'low';
  }

  function init() {
    const p = new URLSearchParams(window.location.search);
    const score = parseInt(p.get('score') ?? p.get('s') ?? '72', 10);
    const level = getRiskLevel(score);
    const r = RISK[level];

    document.title = 'Your results';

    const root = document.documentElement;
    root.style.setProperty('--risk-color',  r.color);
    root.style.setProperty('--risk-bg',     r.bg);
    root.style.setProperty('--risk-border', r.border);
    root.style.setProperty('--risk-text',   r.text);

    document.getElementById('riskDot').style.background = r.color;
    document.getElementById('riskLabel').textContent    = r.label;
    document.getElementById('riskMessage').textContent  = r.msg;

    setTimeout(() => {
      const totalArc = 408.41;
      const dash = r.arcFraction * totalArc;
      document.getElementById('gaugeFill').style.strokeDasharray = dash + ' ' + (totalArc - dash);
      document.getElementById('gaugeNeedle').style.transform = 'rotate(' + r.needleDeg + 'deg)';
    }, 300);
  }

  init();
</script>
</body>
</html>
